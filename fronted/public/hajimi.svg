<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="catGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Cat face -->
  <ellipse cx="50" cy="58" rx="35" ry="30" fill="#f97316"/>
  <!-- Left ear -->
  <polygon points="22,38 12,12 38,30" fill="#f97316"/>
  <polygon points="25,35 18,18 35,30" fill="#fbbf24"/>
  <!-- Right ear -->
  <polygon points="78,38 88,12 62,30" fill="#f97316"/>
  <polygon points="75,35 82,18 65,30" fill="#fbbf24"/>
  <!-- Eyes -->
  <ellipse cx="38" cy="55" rx="6" ry="7" fill="#1c1917"/>
  <ellipse cx="62" cy="55" rx="6" ry="7" fill="#1c1917"/>
  <ellipse cx="40" cy="52" rx="2.5" ry="3" fill="white"/>
  <ellipse cx="64" cy="52" rx="2.5" ry="3" fill="white"/>
  <!-- Nose -->
  <ellipse cx="50" cy="63" rx="3" ry="2.5" fill="#fcd34d"/>
  <!-- Mouth -->
  <path d="M44 68 Q50 75 56 68" fill="none" stroke="#1c1917" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="10" y1="58" x2="30" y2="60" stroke="#1c1917" stroke-width="0.8"/>
  <line x1="10" y1="63" x2="30" y2="63" stroke="#1c1917" stroke-width="0.8"/>
  <line x1="10" y1="68" x2="30" y2="66" stroke="#1c1917" stroke-width="0.8"/>
  <!-- Whiskers right -->
  <line x1="90" y1="58" x2="70" y2="60" stroke="#1c1917" stroke-width="0.8"/>
  <line x1="90" y1="63" x2="70" y2="63" stroke="#1c1917" stroke-width="0.8"/>
  <line x1="90" y1="68" x2="70" y2="66" stroke="#1c1917" stroke-width="0.8"/>
  <!-- Cheek blush -->
  <ellipse cx="28" cy="64" rx="6" ry="4" fill="#fca5a5" opacity="0.4"/>
  <ellipse cx="72" cy="64" rx="6" ry="4" fill="#fca5a5" opacity="0.4"/>
  <!-- Paw -->
  <ellipse cx="50" cy="88" rx="12" ry="6" fill="#f97316"/>
  <ellipse cx="42" cy="86" rx="3.5" ry="2.5" fill="#fbbf24"/>
  <ellipse cx="50" cy="85" rx="3.5" ry="2.5" fill="#fbbf24"/>
  <ellipse cx="58" cy="86" rx="3.5" ry="2.5" fill="#fbbf24"/>
  <!-- Fish icon on belly -->
  <path d="M48 78 L52 78 L54 82 L52 80 L50 82 L48 80 L46 82 Z" fill="#fcd34d"/>
</svg>