version: "3.9"

services:
  frontend:
    build:
      context: ./fronted
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    restart: unless-stopped

  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "pip install fastapi uvicorn pydantic-settings && uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    restart: unless-stopped
